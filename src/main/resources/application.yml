spring:
  application:
    name: faithlinkcore

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/faithlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # Set to 'update' to persist data across sessions and restarts.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

  jwt:
    secret: ${JWT_SECRET:"FaithLink@SecureJWT#Key2024!ChangeThisInProduction"}
    expiration: 86400000  # 24 hours in milliseconds

server:
  port: ${PORT:8082}

logging:
  level:
    com.faithlink.core: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
