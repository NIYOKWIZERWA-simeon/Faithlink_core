<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FaithLink Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #764ba2;
        }
        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand-icon {
            font-size: 3.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        .login-title {
            color: #2d3748;
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .login-subtitle {
            color: #718096;
            margin-bottom: 35px;
        }
        .nav-pills {
            background: #f7fafc;
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .nav-link {
            color: #718096;
            font-weight: 600;
            border-radius: 12px !important;
            transition: all 0.3s;
        }
        .nav-link.active {
            background: var(--primary-gradient) !important;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .form-label {
            font-weight: 600;
            color: #4a5568;
            display: block;
            text-align: left;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 12px;
            padding: 12px 20px;
            border: 2px solid #edf2f7;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .btn-submit {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .back-link {
            color: #a0aec0;
            text-decoration: none;
            font-weight: 600;
            margin-top: 30px;
            display: inline-block;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent-color); }
        
        .alert { border-radius: 12px; display: none; margin-bottom: 20px; }
        
        footer {
            margin-top: 40px;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">
            <i class="fas fa-church"></i>
        </div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to your FaithLink Core account</p>

        <div id="alert" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="alertMessage">Login failed.</span>
        </div>
        <div id="successAlert" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            Account created! Redirecting...
        </div>

        <ul class="nav nav-pills nav-justified" id="authTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">Sign In</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">Register</button></li>
        </ul>

        <div class="tab-content mt-4">
            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login-pane">
                <form id="loginForm">
                    <div class="text-start">
                        <label class="form-label"><i class="fas fa-envelope me-2"></i>Email Address</label>
                        <input type="email" class="form-control" id="username" placeholder="name@example.com" required>
                        <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-submit" id="loginBtn">
                        <span id="loginBtnText">Sign In</span>
                    </button>
                </form>
            </div>

            <!-- REGISTER -->
            <div class="tab-pane fade" id="register-pane">
                <form id="registerForm">
                    <div class="row g-2">
                        <div class="col-6 text-start"><label class="form-label">First Name</label><input type="text" class="form-control" id="regFirstName" required></div>
                        <div class="col-6 text-start"><label class="form-label">Last Name</label><input type="text" class="form-control" id="regLastName" required></div>
                    </div>
                    <div class="text-start">
                        <label class="form-label">Email</label><input type="email" class="form-control" id="regEmail" required>
                        <label class="form-label">Phone</label><input type="tel" class="form-control" id="regPhone">
                        <label class="form-label">Password</label><input type="password" class="form-control" id="regPassword" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-submit" id="regBtn">Create Account</button>
                </form>
            </div>
        </div>

        <a href="/" class="back-link"><i class="fas fa-arrow-left me-2"></i>Back to Home</a>
    </div>

    <footer>
        &copy; 2026 FaithLink Core. Connecting Communities.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // FORM HANDLERS (Same logic as before, just updated UI hooks)
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btnText = document.getElementById('loginBtnText');
            const alertDiv = document.getElementById('alert');
            
            btnText.textContent = 'Authenticating...';
            alertDiv.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if(!res.ok) throw new Error('Invalid credentials');
                const data = await res.json();
                localStorage.setItem('user', JSON.stringify({ ...data.user, token: data.token }));
                window.location.href = '/dashboard';
            } catch (err) {
                alertDiv.style.display = 'block';
                document.getElementById('alertMessage').textContent = err.message;
                btnText.textContent = 'Sign In';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const regData = {
                firstName: document.getElementById('regFirstName').value,
                lastName: document.getElementById('regLastName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value
            };
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(regData)
                });
                if(!res.ok) throw new Error('Registration failed');
                const data = await res.json();
                localStorage.setItem('user', JSON.stringify({ ...data.user, token: data.token }));
                document.getElementById('successAlert').style.display = 'block';
                setTimeout(() => window.location.href = '/dashboard', 1500);
            } catch (err) {
                const alertDiv = document.getElementById('alert');
                alertDiv.style.display = 'block';
                document.getElementById('alertMessage').textContent = err.message;
            }
        });
    </script>
</body>
</html>
