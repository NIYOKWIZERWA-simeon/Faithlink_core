<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FaithLink Core</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .login-title {
            color: #2c3e50;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .login-subtitle {
            color: #7f8c8d;
            font-size: 1rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 20px;
            border: 2px solid #e9ecef;
            margin-bottom: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .login-icon {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        .alert {
            border-radius: 10px;
            display: none;
        }
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #764ba2;
        }
        .spinner-border {
            width: 1rem;
            height: 1rem;
            margin-right: 8px;
        }
        .demo-accounts {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        .demo-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: #6c757d;
            margin-bottom: 15px;
        }
        .demo-account {
            background: white;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-church"></i>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your FaithLink Core account</p>
        </div>

        <div id="alert" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="alertMessage">Login failed. Please try again.</span>
        </div>
        
        <div id="successAlert" class="alert alert-success mt-3" style="display: none;" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span id="successMessage">Account created successfully! Redirecting...</span>
        </div>

        <ul class="nav nav-pills nav-justified mb-4" id="authTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button" role="tab">Sign In</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button" role="tab" style="background-color: transparent;">Create Account</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabContent">
            <!-- LOGIN TAB -->
            <div class="tab-pane fade show active" id="login-pane" role="tabpanel" tabindex="0">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input type="email" class="form-control" id="username" name="username" 
                               placeholder="Enter your email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
                        <span id="loginBtnText">Sign In</span>
                        <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>
            </div>

            <!-- REGISTER TAB -->
            <div class="tab-pane fade" id="register-pane" role="tabpanel" tabindex="0">
                <form id="registerForm">
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" id="regFirstName" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="regLastName" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
                        <input type="email" class="form-control" id="regEmail" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-phone me-2"></i>Phone</label>
                        <input type="tel" class="form-control" id="regPhone" placeholder="+123456789">
                    </div>
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-lock me-2"></i>Password</label>
                        <input type="password" class="form-control" id="regPassword" minlength="6" required>
                        <small class="text-muted d-block mt-1">Must be at least 6 characters long.</small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-login mt-2" id="regBtn">
                        <span id="regBtnText">Create Account</span>
                        <span id="regSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    </button>
                </form>
            </div>
        </div>



        <div class="text-center mt-4">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');
            const alert = document.getElementById('alert');
            const alertMessage = document.getElementById('alertMessage');
            document.getElementById('successAlert').style.display = 'none';
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtnText.textContent = 'Signing in...';
            loginSpinner.classList.remove('d-none');
            alert.style.display = 'none';
            
            try {
                const data = await mockLogin(username, password);
                
                localStorage.setItem('user', JSON.stringify({
                    id: data.user.id,
                    email: data.user.email,
                    token: data.token,
                    roles: data.user.roles,
                    firstName: data.user.firstName,
                    lastName: data.user.lastName,
                    churchId: data.user.churchId
                }));
                
                window.location.href = '/dashboard';
                
            } catch (error) {
                alert.style.display = 'block';
                alertMessage.textContent = error.message;
                loginBtn.disabled = false;
                loginBtnText.textContent = 'Sign In';
                loginSpinner.classList.add('d-none');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const regData = {
                firstName: document.getElementById('regFirstName').value,
                lastName: document.getElementById('regLastName').value,
                email: document.getElementById('regEmail').value,
                phone: document.getElementById('regPhone').value,
                password: document.getElementById('regPassword').value,
            };
            
            const regBtn = document.getElementById('regBtn');
            const regBtnText = document.getElementById('regBtnText');
            const regSpinner = document.getElementById('regSpinner');
            const alert = document.getElementById('alert');
            const alertMessage = document.getElementById('alertMessage');
            const successAlert = document.getElementById('successAlert');
            
            regBtn.disabled = true;
            regBtnText.textContent = 'Creating Account...';
            regSpinner.classList.remove('d-none');
            alert.style.display = 'none';
            successAlert.style.display = 'none';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(regData)
                });
                
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.message || 'Registration failed');
                }
                
                const data = await response.json();
                
                localStorage.setItem('user', JSON.stringify({
                    id: data.user.id,
                    email: regData.email,
                    token: data.token,
                    roles: data.user.roles,
                    firstName: data.user.firstName,
                    lastName: data.user.lastName,
                    churchId: data.user.churchId
                }));
                
                successAlert.style.display = 'block';
                setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
                
            } catch (error) {
                alert.style.display = 'block';
                alertMessage.textContent = error.message;
                regBtn.disabled = false;
                regBtnText.textContent = 'Create Account';
                regSpinner.classList.add('d-none');
            }
        });
        
        async function mockLogin(email, password) {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password })
            });
            
            if (response.status === 401 || response.status === 403) {
                throw new Error('Invalid credentials. Please try again.');
            }
            
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.message || 'Login failed due to server error');
            }
            
            return await response.json();
        }
        
        // Check if user is already logged in
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (user) {
                // Redirect to dashboard if already logged in
                window.location.href = '/dashboard';
            }
        }
    </script>
    <!-- FOOTER -->
    <footer class="mt-5 py-4 w-100 text-center" style="background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); position: relative; bottom: 0; color: white;">
        <div class="container">
            <p class="small mb-0 opacity-75">&copy; 2026 FaithLink Core. Connecting Communities.</p>
        </div>
    </footer>
</body>
</html>
