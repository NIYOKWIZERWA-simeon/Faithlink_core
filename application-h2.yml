spring:
  application:
    name: faithlink_core
  datasource:
    url: jdbc:h2:mem:faithlink_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    user:
      name: admin
      password: admin123

jwt:
  secret: faithlink-secret-key-for-jwt-token-generation-very-long-secret
  expiration: 86400000

server:
  port: 8080
